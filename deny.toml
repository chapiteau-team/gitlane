[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
    # serde_yaml is unmaintained as of 2024; replacement is tracked separately
    # (see Tier 2 plan: migrate to serde_yml or serde_norway).
    "RUSTSEC-2024-0320",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
    "Unlicense",
]
confidence-threshold = 0.93

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
